<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BRÚJULA - Destinos</title>

    <meta name="author" content="Lu-Isa" />
    <meta
      name="description"
      content="Explorá los destinos disponibles de BRÚJULA: ciudades, imágenes y detalles de viaje."
    />
    <meta name="keywords" content="destinos, turismo, viajes, ciudades" />

    <link rel="icon" type="image/png" href="imagenes/favicon.png" />

    <!-- Tipografías e íconos -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    <link rel="stylesheet" href="estilos.css" />
    <script src="script.js" defer></script>
  </head>

  <body class="page-destinos" onload="cargarDestinos(); initAnio()">
    <header class="site-header">
      <div class="wrap header-grid">
        <a class="brand" href="index.html" aria-label="Volver al inicio">
          <img src="imagenes/logo.png" alt="Logo de BRÚJULA" width="40" height="40" />
          <div class="brand-text">
            <h1 class="brand-title">BRÚJULA</h1>
            <span class="brand-sub">Agencia de viajes</span>
          </div>
        </a>

        <div class="top-actions">
          <!-- Buscador -->
          <form id="form-buscar" class="search" role="search" aria-label="Buscar destinos" onsubmit="filtrarDestinos(); return false;">
            <label for="q" class="sr-only">Buscar</label>
            <input id="q" name="q" type="text" placeholder="Buscar" size="18" maxlength="32" oninput="filtrarDestinos()" />
            <button type="submit" aria-label="Buscar">
              <span class="material-symbols-outlined" aria-hidden="true">search</span>
            </button>
          </form>

          <!-- Menú -->
          <div class="menu-wrapper" id="menuWrapper">
            <button id="btnMenu" class="btn-hamb" type="button" aria-label="Abrir menú" aria-controls="panelMenu" aria-expanded="false" onclick="toggleMenu()">
              <span class="material-symbols-outlined" aria-hidden="true">menu</span>
            </button>

            <nav id="panelMenu" class="panel-menu" aria-label="Menú principal">
              <ul class="menu-list">
                <li><a href="index.html"><span class="material-symbols-outlined" aria-hidden="true">home</span> INICIO</a></li>
                <li><a href="destinos.html"><span class="material-symbols-outlined" aria-hidden="true">map</span> DESTINOS</a></li>
                <li><a href="itinerario.html"><span class="material-symbols-outlined" aria-hidden="true">calendar_add_on</span> ITINERARIO</a></li>
                <li><a href="contacto.html"><span class="material-symbols-outlined" aria-hidden="true">contact_page</span> CONTACTO</a></li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </header>

    <main id="main">
      <!-- Encabezado -->
      <section class="wrap destinos-head">
        <header>
          <h2 class="page-title">DESTINOS</h2>
        </header>

        <div class="destinos-filtros">
          <button id="btnFiltros" class="btn-filtro" type="button" aria-controls="filtrosOverlay" onclick="abrirFiltros()">
            <span class="material-symbols-outlined" aria-hidden="true">tune</span>
            FILTROS
          </button>
        </div>
      </section>

      <!-- Grilla (se llena con cargarDestinos() en script.js) -->
      <section class="wrap destinos-layout">
        <div class="destinos-grid" id="destinosGrid" aria-live="polite"></div>
      </section>
    </main>

    <!-- FILTROS -->
    <div id="filtrosOverlay" class="filtros-overlay" hidden>
      <div class="filtros-backdrop" onclick="cerrarFiltros()"></div>
      <section class="filtros-panel" role="dialog" aria-modal="true" aria-labelledby="titulo-filtros">
        <button type="button" class="filtros-close" aria-label="Cerrar filtros" onclick="cerrarFiltros()">✕</button>
        <h3 id="titulo-filtros">
          <span class="material-symbols-outlined" aria-hidden="true">filter_alt</span>
          Filtros
        </h3>

        <form id="form-filtros" class="filtros-form" onsubmit="filtrarDestinos(); cerrarFiltros(); return false;">
          <div class="filtro-item">
            <label for="rangoPrecio">Precio por día (USD)</label>
            <div class="range-wrap">
              <input type="range" id="rangoPrecio" min="50" max="300" value="300" oninput="mostrarPrecio(this.value)" />
              <output id="precioOut">300</output>
            </div>
          </div>

          <div class="filtro-item">
            <label for="categoria">Categoría</label>
            <select id="categoria">
              <option value="todas">Todas</option>
              <option value="playa">Playa</option>
              <option value="naturaleza">Naturaleza</option>
              <option value="cultural">Cultural</option>
              <option value="historica">Histórica</option>
              <option value="urbana">Urbana</option>
              <option value="romantica">Romántica</option>
              <option value="fiesta">Fiesta</option>
              <option value="aventura">Aventura</option>
              <option value="exotica">Exótica</option>
              <option value="moderna">Moderna</option>
              <option value="tecnologica">Tecnológica</option>
            </select>
          </div>

          <div class="filtro-item">
            <label for="orden">Orden alfabético</label>
            <select id="orden">
              <option value="asc">Ascendente (A-Z)</option>
              <option value="desc">Descendente (Z-A)</option>
            </select>
          </div>

          <div class="filtro-actions">
            <button class="btn" type="submit">Aplicar</button>
            <button class="btn btn-sec" type="button" onclick="limpiarFiltros()">Limpiar</button>
          </div>
        </form>
      </section>
    </div>

    <!-- DETALLES y RESERVA -->
    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
      <div class="modal-backdrop" onclick="cerrarModal()"></div>
      <section class="modal-card" aria-describedby="modal-desc">
        <button id="modal-close" class="modal-close" aria-label="Cerrar detalles" onclick="cerrarModal()">✕</button>

        <h3 id="modal-title">Destino: detalle</h3>

        <div class="slider" aria-label="Galería de imágenes">
          <button type="button" class="slider-prev" aria-label="Imagen anterior" onclick="moverSlider(-1)">‹</button>
          <figure class="slider-frame">
            <img id="slider-img" src="" alt="Imagen del destino" />
            <figcaption id="modal-desc" class="sr-only">Imágenes ilustrativas del destino.</figcaption>
          </figure>
          <button type="button" class="slider-next" aria-label="Imagen siguiente" onclick="moverSlider(1)">›</button>
        </div>

        <article class="modal-info">
          <h4 class="modal-sub">Historia</h4>
          <p id="modal-historia">—</p>

          <h4 class="modal-sub">Atracciones</h4>
          <p id="modal-atracciones">—</p>

          <h4 class="modal-sub">Datos útiles</h4>
          <p id="modal-extra">—</p>

          <!-- RESERVA -->
          <div class="reserva">
            <h4 class="modal-sub">Reservar</h4>
            <div class="reserva-grid">
              <label for="res-fecha">Fecha de inicio</label>
              <input type="date" id="res-fecha" />
              <label for="res-dias">Días</label>
              <input type="number" id="res-dias" min="1" max="60" step="1" placeholder="Ej: 5" />
            </div>

            <div class="reserva-actions">
              <button type="button" id="btnCalcular" class="btn" onclick="calcularCosto()">Calcular costo</button>
              <span id="res-total" class="reserva-total" aria-live="polite"></span>
            </div>

            <button type="button" id="btnReservar" class="btn btn-reservar" onclick="guardarReserva()" hidden>
              Guardar en Itinerario
            </button>
          </div>
        </article>
      </section>
    </div>

    <footer class="site-footer">
      <div class="wrap">
        <p>&copy; <span id="anio">2025</span> BRÚJULA - Agencia de viajes</p>
      </div>
    </footer>
  </body>
</html>
